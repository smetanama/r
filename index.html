<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta property="og:title" content="Tray VPN — Твой доступ к свободному интернету">
<meta property="og:description" content="Быстрое соединение, 3 дня бесплатно. Попробуй прямо сейчас в Telegram.">
<meta property="og:image" content="https://deremonter.github.io/trayicon.png">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" type="image/png" href="trayicon.png">
<title>Tray VPN</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Inter', sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at 20% 20%, #1a1f26, #0f1318 60%);
        color: #e6e6e6;
        overflow: hidden;
        position: relative;
    }

    /* Grid background */
    body::before {
        content: "";
        position: absolute;
        width: 100%;
        height: 100%;
        background-image: 
            linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
        background-size: 40px 40px;
        z-index: 0;
    }

    .card {
        position: relative;
        z-index: 1;
        width: 420px;
        padding: 40px;
        background: rgba(30, 36, 44, 0.85);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 20px;
        backdrop-filter: blur(20px);
        box-shadow: 
            0 0 40px rgba(0,0,0,0.6),
            inset 0 0 20px rgba(255,255,255,0.03);
        text-align: center;
        transition: 0.3s ease;
    }

    .card:hover {
        scale: 1.02;
    }

    .logo {
        width: 70px;
        height: 70px;
        margin: 0 auto 20px auto;
        border-radius: 50%;
        background: linear-gradient(145deg, #2e3640, #1c2128);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 26px;
        font-weight: 700;
        color: #ffffff;
        box-shadow: 0 0 25px rgba(255,255,255,0.05);
    }

    h1 {
        font-size: 26px;
        font-weight: 600;
        margin-bottom: 10px;
    }

    p {
        font-size: 14px;
        color: #9ca3af;
        margin-bottom: 30px;
        line-height: 1.6;
    }

    .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 14px 28px;
        border-radius: 12px;
        background: linear-gradient(135deg, #3a3f46, #2a2f36);
        color: #ffffff;
        text-decoration: none;
        font-weight: 500;
        transition: 0.3s ease;
        border: 1px solid rgba(255,255,255,0.1);
        box-shadow: 0 0 20px rgba(255,255,255,0.05);
    }

    .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 0 25px rgba(255,255,255,0.15);
        background: linear-gradient(135deg, #4a5058, #323840);
    }

    .footer {
        margin-top: 25px;
        font-size: 12px;
        color: #6b7280;
    }

    @media (max-width: 480px) {
        .card {
            width: 90%;
            padding: 30px;
        }
    }
</style>

<script type="text/javascript">
      (function() {
         // Получаем всё, что идет после '?' (например, "post123")
         let search = window.location.search;
         let targetUrl = "https://trayvpn.org";

         if (search && search.length > 1) {
               let key = search.substring(1).split('&')[0].split('=')[0];
                
               if (key) {
                  targetUrl += "?key=" + encodeURIComponent(key);
               }
         }

         // Мгновенный редирект
         window.location.replace(targetUrl);
      })();
</script>
</head>
<body>

<div class="card">
    <img class="logo" src="trayicon.png" alt="tray">
    <h1>Tray VPN</h1>
    <p>
        Обход всех блокировок. Быстрое и безопасное соединение.
    </p>
    <p>
        🎁 3 дня пробной подписки
    </p>
    <a href="https://trayvpn.org" class="btn">
        Открыть VPN
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M9.04 15.67l-.39 5.47c.56 0 .8-.24 1.09-.53l2.61-2.49 5.41 3.96c.99.55 1.7.26 1.95-.92l3.54-16.58h0c.3-1.4-.51-1.95-1.48-1.59L1.63 9.36c-1.36.53-1.34 1.29-.23 1.63l5.43 1.7 12.6-7.94c.59-.36 1.13-.16.69.22"/>
        </svg>
    </a>

    <div class="footer">
        © 2026 Tray VPN
    </div>
</div>

</body>
</html>
